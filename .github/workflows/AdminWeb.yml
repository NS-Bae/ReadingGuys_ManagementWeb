name: ReadingGuys AdminWeb CI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 3. 의존성 설치
        run: npm ci

      - name: 4. 환경파일 생성
        run: |
          cat << 'EOF' > .env.production
          ${{ secrets.FRONTEND_ENV_PROD }}
          EOF

      - name: 5. 프론트 빌드
        env:
          CI: false
        run: npm run build

      - name: 6. SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: 7. 서버 디렉토리 준비
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} "
            sudo mkdir -p /var/www/rg-management-web/build
          "

      - name: 8. build 폴더 업로드
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" \
            ./build/ ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/rg-management-web-build/

          ssh -i ~/.ssh/id_ed25519 ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} "
            sudo rm -rf /var/www/rg-management-web/build/* &&
            sudo mkdir -p /var/www/rg-management-web/build &&
            sudo cp -r /tmp/rg-management-web-build/* /var/www/rg-management-web/build/
          "

      - name: 9. nginx 설정 파일 업로드 및 적용
        run: |
          scp -i ~/.ssh/id_ed25519 ./deploy/nginx/managementweb.conf \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/managementweb.conf

          ssh -i ~/.ssh/id_ed25519 ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} "
            sudo mv /tmp/managementweb.conf /etc/nginx/sites-available/managementweb &&
            sudo ln -sfn /etc/nginx/sites-available/managementweb /etc/nginx/sites-enabled/managementweb &&
            sudo rm -f /etc/nginx/sites-enabled/default &&
            sudo nginx -t &&
            sudo systemctl reload nginx
          "